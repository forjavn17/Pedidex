
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PEDIDEX PRO</title>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --s1:#141414; --s2:#1c1c1c; --s3:#252525;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --oro:#FFD166; --oro2:#ffbc36;
  --wa:#25D366; --rojo:#FF4C4C; --rojo-d:#cc3a3a;
  --gris1:#888; --gris2:#555; --gris3:#333;
  --blanco:#fff;
  --r:14px; --rsm:9px; --rxs:6px;
  --sh-oro:0 4px 24px rgba(255,209,102,.22);
  --sh-wa:0 4px 20px rgba(37,211,102,.28);
  --sh-rojo:0 4px 20px rgba(255,76,76,.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--blanco);min-height:100vh;overflow-x:hidden;}
img{display:block;max-width:100%;}
button,input,select,textarea{font-family:inherit;}
.hidden{display:none!important;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s ease;}
#loader.out{opacity:0;pointer-events:none;}
.ld-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:34px;color:var(--oro);letter-spacing:3px;text-shadow:0 0 40px rgba(255,209,102,.3);}
.ld-logo span{color:rgba(255,255,255,.25);}
.spinner{width:32px;height:32px;border:3px solid rgba(255,209,102,.12);border-top-color:var(--oro);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── SPLASH ── */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;position:relative;animation:fadeUp .5s ease both;}
#splash::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(255,209,102,.06) 0%,transparent 70%);pointer-events:none;}
.splash-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;color:var(--oro);letter-spacing:4px;text-shadow:0 0 50px rgba(255,209,102,.3);margin-bottom:6px;text-align:center;}
.splash-sub{font-size:14px;color:var(--gris1);letter-spacing:.5px;margin-bottom:48px;text-align:center;}
.splash-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:420px;}
.role-card{background:var(--s1);border:1.5px solid var(--border2);border-radius:20px;padding:28px 18px;cursor:pointer;transition:all .22s ease;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.role-card:hover{transform:translateY(-4px);box-shadow:var(--sh-oro);border-color:var(--oro);}
.role-card .icon{font-size:42px;line-height:1;}
.role-card .titulo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;}
.role-card .desc{font-size:12px;color:var(--gris1);line-height:1.4;}
.splash-admin-link{margin-top:32px;font-size:12px;color:var(--gris2);cursor:pointer;transition:color .15s;}
.splash-admin-link:hover{color:var(--gris1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ── VIEWS ── */
.view{display:none;flex-direction:column;min-height:100vh;}
.view.active{display:flex;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.topbar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:var(--oro);letter-spacing:2px;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:7px;}
.topbar-user{font-size:12px;color:var(--gris1);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--oro),var(--oro2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#1a1200;flex-shrink:0;}

/* ── BOTONES ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--rsm);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;line-height:1;}
.btn:active{transform:scale(.97);}
.btn-oro{background:linear-gradient(135deg,var(--oro),var(--oro2));color:#1a1200;font-weight:700;box-shadow:var(--sh-oro);}
.btn-wa{background:var(--wa);color:#fff;box-shadow:var(--sh-wa);}
.btn-rojo{background:var(--rojo);color:#fff;}
.btn-ghost{background:transparent;color:var(--gris1);border:1.5px solid var(--border2);}
.btn-sm{padding:7px 12px;font-size:13px;}

/* ── INPUTS ── */
.field{display:flex;flex-direction:column;gap:5px;}
.label{font-size:12px;font-weight:500;color:var(--gris1);letter-spacing:.3px;}
.inp{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--blanco);font-size:14px;padding:11px 13px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.inp:focus{border-color:rgba(255,209,102,.5);box-shadow:0 0 0 3px rgba(255,209,102,.07);}

/* ── PAGE CONTENT ── */
.page-content{max-width:540px;width:100%;margin:0 auto;padding:16px 14px 100px;display:flex;flex-direction:column;gap:14px;}
.section-label{font-size:11px;font-weight:500;color:var(--gris1);text-transform:uppercase;letter-spacing:1px;padding:0 2px;}

/* ── EMPRENDEDOR CARD ── */
.emp-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s; margin-bottom: 12px;}
.emp-card-header{background:linear-gradient(135deg,var(--s2),var(--s3));padding:16px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.emp-avatar-lg{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--oro),var(--oro2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#1a1200;flex-shrink:0;}
.emp-nombre{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:2px;}

/* ── PRODUCTO INLINE ── */
.prod-inline{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-top:1px solid var(--border);}
.prod-photo{width:58px;height:58px;border-radius:10px;object-fit:cover;background:var(--s2);border:1px solid var(--border);}
.prod-inline-nombre{font-weight:600;font-size:14px;margin-bottom:2px;}
.prod-inline-precio{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--oro);}
.prod-add-btn{background:linear-gradient(135deg,var(--oro),var(--oro2));border:none;border-radius:var(--rxs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1a1200;cursor:pointer;}

/* ── BARRA TOTAL ── */
#total-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,12,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);gap:10px;}
#total-bar.visible{transform:translateY(0);}
.total-monto{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:var(--oro);}

/* ── MODALES ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(6px);}
.modal-ov.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:22px;position:relative;}

/* ── TOAST ── */
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s1);border:1px solid var(--border2);border-radius:var(--rsm);padding:10px 16px;opacity:0;transition:all .3s;z-index:900;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="loader"><div class="ld-logo">PEDIDEX <span>PRO</span></div><div class="spinner"></div></div>
<div id="toast"></div>

<div id="splash">
  <div style="margin-bottom:10px;font-size:48px;">🛒</div>
  <div class="splash-logo">PEDIDEX</div>
  <div class="splash-sub">Comidas rápidas · Río Grande TDF</div>
  <div class="splash-cards">
    <div class="role-card" onclick="irA('cliente-home')"><div class="icon">🍔</div><div class="titulo">Soy Cliente</div><div class="desc">Explorá el menú</div></div>
    <div class="role-card" onclick="irA('emprendedor-panel')"><div class="icon">👨‍🍳</div><div class="titulo">Soy Negocio</div><div class="desc">Gestioná tu tienda</div></div>
  </div>
</div>

<div class="view" id="view-cliente-home">
  <div class="topbar"><div class="topbar-brand" onclick="volverSplash()">← PEDIDEX</div></div>
  <div class="page-content">
    <input type="text" class="inp" id="cli-busqueda" placeholder="🔍 Buscar comida..." oninput="renderEmprendedores(this.value)">
    <div id="grid-emprend"></div>
  </div>
</div>

<div class="view" id="view-emprendedor-panel">
  <div class="topbar"><div class="topbar-brand" onclick="volverSplash()">← PANEL</div></div>
  <div class="page-content">
    <div id="panel-admin-content">
       <h3 class="section-label">Tus Productos</h3>
       <button class="btn btn-oro" onclick="nuevoProducto()">+ Agregar Producto</button>
       <div id="lista-productos-admin" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
/* ── MOTOR CLOUD P2P (GUN.JS) ── */
const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
const appDB = gun.get('pedidex_pro_production_v3');

// Datos base (se sincronizan con Gun)
let db = {
  emprendedores: [
    {
      id: "negocio_1",
      nombre: "Burgers & Co",
      desc: "Las mejores hamburguesas de TDF",
      wa: "2964000000",
      productos: [
        { id: 101, nombre: "Cheeseburger", precio: 5500, emoji: "🍔" },
        { id: 102, nombre: "Papas Fritas", precio: 2200, emoji: "🍟" }
      ]
    }
  ]
};

/* ── SINCRONIZACIÓN ── */
function initCloud() {
    // Escuchar cambios globales
    appDB.on((data) => {
        if (data && data.json) {
            try {
                const cloudData = JSON.parse(data.json);
                db = cloudData;
                renderEmprendedores();
                renderProductosAdmin();
            } catch(e) { console.error("Error sync", e); }
        }
    });

    // Carga local inicial para evitar latencia
    const local = localStorage.getItem('pedidex_v3_local');
    if(local) {
        db = JSON.parse(local);
        renderEmprendedores();
    }
}

function saveCloud() {
    const stringified = JSON.stringify(db);
    appDB.put({ json: stringified });
    localStorage.setItem('pedidex_v3_local', stringified);
}

/* ── LÓGICA DE INTERFAZ ── */
function irA(id) {
  document.getElementById('splash').style.display = 'none';
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if(id === 'cliente-home') renderEmprendedores();
  if(id === 'emprendedor-panel') renderProductosAdmin();
}

function volverSplash() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('splash').style.display = 'flex';
}

function renderEmprendedores(busqueda = "") {
  const container = document.getElementById('grid-emprend');
  if(!container) return;
  container.innerHTML = "";

  db.emprendedores.forEach(emp => {
    if(emp.nombre.toLowerCase().includes(busqueda.toLowerCase())) {
      const card = document.createElement('div');
      card.className = 'emp-card';
      card.innerHTML = `
        <div class="emp-card-header">
          <div class="emp-avatar-lg">${emp.nombre[0]}</div>
          <div>
            <div class="emp-nombre">${emp.nombre}</div>
            <div style="font-size:12px;color:var(--gris1)">${emp.desc}</div>
          </div>
        </div>
        <div class="emp-card-body">
          ${emp.productos.map(p => `
            <div class="prod-inline">
              <div class="prod-photo-placeholder" style="font-size:24px;width:58px;height:58px;background:var(--s2);display:flex;align-items:center;justify-content:center;border-radius:10px;">${p.emoji}</div>
              <div style="flex:1;margin-left:10px;">
                <div class="prod-inline-nombre">${p.nombre}</div>
                <div class="prod-inline-precio">$${p.precio}</div>
              </div>
              <button class="prod-add-btn" onclick="showToast('Agregado!')">+</button>
            </div>
          `).join('')}
        </div>
      `;
      container.appendChild(card);
    }
  });
}

function renderProductosAdmin() {
    const container = document.getElementById('lista-productos-admin');
    if(!container) return;
    const emp = db.emprendedores[0]; // Ejemplo con el primero
    container.innerHTML = emp.productos.map(p => `
        <div class="prod-inline" style="background:var(--s2);margin-bottom:5px;border-radius:8px;">
            <div style="flex:1"><b>${p.nombre}</b> - $${p.precio}</div>
            <button class="btn btn-sm btn-rojo" onclick="eliminarProd(${p.id})">Eliminar</button>
        </div>
    `).join('');
}

function nuevoProducto() {
    const nombre = prompt("Nombre del producto:");
    if(!nombre) return;
    const precio = prompt("Precio:");
    db.emprendedores[0].productos.push({
        id: Date.now(),
        nombre: nombre,
        precio: parseInt(precio) || 0,
        emoji: "📦"
    });
    saveCloud(); // Sincroniza a todos los dispositivos
}

function eliminarProd(id) {
    db.emprendedores[0].productos = db.emprendedores[0].productos.filter(p => p.id !== id);
    saveCloud();
}

function showToast(msj) {
  const t = document.getElementById('toast');
  t.innerText = msj;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = () => {
    initCloud();
    setTimeout(() => document.getElementById('loader').classList.add('out'), 800);
};
</script>
</body>
</html>
